# docker-compose up -d
#
# Defaults to LLM_PROVIDER=groq (no local model download needed).
# To use local Ollama instead, set LLM_PROVIDER=ollama in .env and
# uncomment the `ollama` service + `depends_on` block below.

services:
  app:
    build: .
    container_name: coursemate-app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
    restart: unless-stopped
